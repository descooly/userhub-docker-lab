<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UserHub • Docker Lab</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e2937;
            --accent: #22d3ee;
            --text: #e2e8f0;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { color: var(--accent); text-align: center; }
        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
        }
        form { display: grid; grid-template-columns: 1fr 1fr auto; gap: 12px; }
        input { padding: 12px; border: none; border-radius: 8px; background: #334155; color: white; }
        button {
            padding: 12px 20px;
            background: var(--accent);
            color: #0f172a;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #67e8f9; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }
        th { background: #1e2937; }
        .delete-btn {
            background: #ef4444;
            color: white;
            padding: 6px 12px;
            font-size: 0.9em;
        }
        #result {
            margin-top: 20px;
            padding: 16px;
            background: #1e2937;
            border-radius: 8px;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .status { padding: 8px 16px; border-radius: 9999px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 UserHub • Docker Laboratory</h1>
        <p style="text-align:center; color:#94a3b8;">Flask + PostgreSQL + Redis + Nginx</p>

        <div class="card">
            <h2>Добавить пользователя</h2>
            <form id="userForm">
                <input type="text" id="name" placeholder="Имя" required>
                <input type="email" id="email" placeholder="Email" required>
                <button type="submit">Создать</button>
            </form>
        </div>

        <div class="card">
            <h2>Список пользователей</h2>
            <button onclick="loadUsers()">Обновить список</button>
            <table id="usersTable">
                <thead><tr><th>ID</th><th>Имя</th><th>Email</th><th>Дата</th><th>Действие</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="card">
            <h2>Статистика запросов (Redis)</h2>
            <button onclick="loadStats()">Показать статистику</button>
            <div id="stats"></div>
        </div>

        <div class="card">
            <button onclick="checkHealth()">Проверить здоровье сервисов</button>
            <div id="result"></div>
        </div>
    </div>

    <script>
        const API = '/api/';

        async function loadUsers() {
            const res = await fetch(API + 'users');
            const data = await res.json();
            const tbody = document.querySelector('#usersTable tbody');
            tbody.innerHTML = '';
            data.users.forEach(u => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${u.id}</td>
                    <td>${u.name}</td>
                    <td>${u.email}</td>
                    <td>${new Date(u.created_at).toLocaleString('ru-RU')}</td>
                    <td><button class="delete-btn" onclick="deleteUser(${u.id})">Удалить</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function deleteUser(id) {
            if (!confirm('Удалить пользователя?')) return;
            await fetch(API + `users/${id}`, { method: 'DELETE' });
            loadUsers();
        }

        document.getElementById('userForm').addEventListener('submit', async e => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            await fetch(API + 'users', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name, email})
            });
            document.getElementById('userForm').reset();
            loadUsers();
        });

        async function loadStats() {
            const res = await fetch(API + 'stats');
            const data = await res.json();
            document.getElementById('stats').innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
        }

        async function checkHealth() {
            const res = await fetch(API + 'health');
            const data = await res.json();
            document.getElementById('result').innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
        }

        // Загрузка при старте
        window.onload = loadUsers;
    </script>
</body>
</html>
